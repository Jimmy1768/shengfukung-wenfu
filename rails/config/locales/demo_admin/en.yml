      hero:
        eyebrow: "Team management"
        title: "Manage users"
        body: "Mirror the mobile roster: update rails/db/seeds/admin_controls.rb and reuse the same people in the Android build."
        metric_label: "Active staff"
      last_active_prefix: "Last active"
      seeded:
        title: "Sample users"
        body: "These names match the Android demo so prospects see consistent data."
        empty: "No demo users found. Run bin/rails db:seed to generate sample accounts."
      actions:
        - "View profile"
        - "Reset password"
        - "Deactivate"
      entries:
        - name: "Lina Ortega"
          email: "lina@client-demo.local"
          role: "Portfolio admin"
          status: "Active"
          last_active: "5 minutes ago"
        - name: "Marcus Lee"
          email: "marcus@client-demo.local"
          role: "Regional manager"
          status: "Invited"
          last_active: "30 minutes ago"
