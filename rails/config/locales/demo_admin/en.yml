      hero:
        eyebrow: "Custom feature"
        title: "Custom modules"
        body: "Design admin tooling tailored to your workflows and show prospects what their bespoke dashboards can look like."
      entries:
        - title: "Workflow Automations"
          description: "Route approvals, notify field teams, and sync documents across your existing stack."
          badge: "Tailored playbooks"
        - title: "Executive Insights"
          description: "Blend operational KPIs with finance data for a single source of truth dashboard."
          badge: "C-suite ready"
        - title: "Field Ops Toolkit"
          description: "Give technicians guided checklists, offline sync, and photo capture in-app."
          badge: "Offline capable"
      cta: "Design this module"
    contact:
      demo_auto_reply:
        subject: "Thank you for exploring %{brand}"
        greeting: "Dear %{name},"
        intro: "Thank you for your message. We will respond as soon as possible."
        closing: "Best regards,"
        signature: "%{brand} Team"
        confirmation: "We received your message. Our concierge desk will follow up shortly."
        default_name: "there"
        no_message: "No additional details were provided."
        errors:
          invalid_email: "Please enter a valid email address."
          missing_brevo: "Email delivery is not configured. Add BREVO_API_KEY to continue."
          delivery_failed: "We were unable to send your message. Please try again."
          generic: "Could not process your request."
