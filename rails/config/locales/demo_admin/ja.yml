          body: "外部 API のデータを取り込み、Turbo Streams で可視化。"
        - title: "在庫同期"
          body: "Shopify サンドボックスと連携するバックグラウンド処理を紹介。"
        - title: "ワークフロービルダー"
          body: "ドラッグ&ドロップの自動化フローを試作し、顧客のフィードバックを集める。"
