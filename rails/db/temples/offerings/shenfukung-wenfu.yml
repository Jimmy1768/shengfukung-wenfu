offerings:
  - slug: incense-donation
    kind: service
    label: "香油捐獻"
    registration_period_key: "perennial"
    defaults:
      offering_type: "donation"
      currency: "TWD"
    attributes:
      price_cents: 500
      currency: "TWD"
      description: "敬獻香油以支持廟務運作，廟方依祈願安排上香儀程。"
    form_fields:
      fulfillment:
        title: "工作說明"
        fields:
          - fulfillment_method
          - logistics_notes
    registration_form:
      sections:
        order:
          fields: [quantity, unit_price_cents, currency]
        contact:
          fields: [primary_contact, phone, email, notes]
        logistics:
          fields: []
        ritual_metadata:
          fields: [dedication_message]
      defaults:
        order:
          quantity: 1
      field_settings:
        dedication_message:
          allow_multiple: false

  - slug: family-peace
    kind: event
    label: "平安戲丁口捐"
    defaults:
      offering_type: "ritual"
      currency: "TWD"
    attributes:
      price_cents: 800
      currency: "TWD"
      description: "為全家祈福安康的戲丁口捐，含法會誦經祈求護佑。"
    form_fields:
      ritual:
        title: "儀式設計"
        fields:
          - certificate_hint
          - blessing_purpose
          - blessing_names
    registration_form:
      sections:
        order:
          fields: [quantity, unit_price_cents, currency, certificate_number]
        contact:
          fields: [primary_contact, phone, email, dependents_notes, notes]
        logistics:
          fields: [preferred_date, preferred_slot, arrival_window]
        ritual_metadata:
          fields: [dedication_message]
      defaults:
        logistics:
          preferred_slot: "上午"
      field_settings:
        preferred_slot:
          options: ["上午", "下午", "晚上"]
        arrival_window:
          options: ["08:00-09:00", "09:00-10:00", "10:00-11:00"]

  - slug: lantern-lighting
    kind: service
    label: "點燈作業"
    defaults:
      offering_type: "lamp"
      currency: "TWD"
    attributes:
      price_cents: 1200
      currency: "TWD"
      description: "點燈祈願燈光常明，廟方協助安排燈位與祈福儀式。"
    options:
      period:
        - "常年供燈"
        - "燈節檔期"
    form_fields:
      schedule:
        title: "燈位資訊"
        fields:
          - lamp_type
          - lamp_location
      fulfillment:
        title: "作業紀錄"
        fields:
          - fulfillment_method
          - logistics_notes
    registration_form:
      sections:
        order:
          fields: [quantity, unit_price_cents, currency]
        contact:
          fields: [primary_contact, phone, email]
        logistics:
          fields: [preferred_date, preferred_slot]
        ritual_metadata:
          fields: [ancestor_placard_name, dedication_message, certificate_notes]
      field_settings:
        preferred_slot:
          options: ["Morning", "Afternoon", "Evening"]
        dedication_message:
          allow_multiple: true

  - slug: ancestor-ritual
    kind: event
    label: "祖先拔薦"
    defaults:
      offering_type: "ritual"
      currency: "TWD"
    attributes:
      price_cents: 1500
      currency: "TWD"
      description: "為祖先超薦的法事，含誦經、牌位供奉與證書備註。"
    form_fields:
      ritual:
        title: "作業備註"
        fields:
          - fulfillment_method
          - certificate_hint
          - logistics_notes
    registration_form:
      sections:
        order:
          fields: [quantity, unit_price_cents, currency, certificate_number]
        contact:
          fields: [primary_contact, phone, email, dependents_notes, notes]
        logistics:
          fields: [preferred_date, preferred_slot, arrival_window, ceremony_location]
        ritual_metadata:
          fields: [ancestor_placard_name, dedication_message, incense_option, certificate_notes]
      field_settings:
        preferred_slot:
          options: ["上午", "下午"]
        ceremony_location:
          options: ["本殿", "天官殿", "戶外祭壇"]
        incense_option:
          options: ["Three-stick set", "Five-stick set", "Ten-stick set"]

  - slug: pudu-table
    kind: service
    label: "普渡供桌"
    registration_period_key: "2026-ghost-month"
    defaults:
      offering_type: "table"
      currency: "TWD"
    options:
      period:
        - "中元普渡"
        - "春祭普渡"
    attributes:
      price_cents: 3000
      currency: "TWD"
      description: "含供桌佈置與供品，提供春祭/中元普渡專用桌位。"
    form_fields:
      schedule:
        title: "供桌內容"
        fields:
          - table_items
          - table_size
      logistics:
        title: "作業方式"
        fields:
          - fulfillment_method
    registration_form:
      sections:
        order:
          fields: [quantity, unit_price_cents, currency]
        contact:
          fields: [primary_contact, phone, email]
        logistics:
          fields: [preferred_date, ceremony_location]
        ritual_metadata:
          fields: [ancestor_placard_name, dedication_message]
      defaults:
        logistics:
          ceremony_location: "戶外祭壇"
      field_settings:
        ceremony_location:
          options: ["戶外祭壇", "本殿入口", "後殿"]
        dedication_message:
          allow_multiple: false
