offerings:
  - slug: incense-donation
    label: "香油捐獻"
    defaults:
      offering_type: "donation"
      currency: "TWD"
    form_fields:
      basics:
        fields:
          - title
          - price_cents
          - currency
      donation:
        fields:
          - description
    registration_form:
      sections:
        order:
          fields: [quantity, unit_price_cents, currency]
        contact:
          fields: [primary_contact, phone, email, notes]
        logistics:
          fields: []
        ritual_metadata:
          fields: [dedication_message]
      defaults:
        order:
          quantity: 1

  - slug: family-peace
    label: "平安戲丁口捐"
    defaults:
      offering_type: "ritual"
      currency: "TWD"
    form_fields:
      basics:
        fields:
          - title
          - period
          - price_cents
          - currency
      ritual:
        fields:
          - description
    registration_form:
      sections:
        order:
          fields: [quantity, unit_price_cents, currency, certificate_number]
        contact:
          fields: [primary_contact, phone, email, dependents_notes, notes]
        logistics:
          fields: [preferred_date, preferred_slot, arrival_window]
        ritual_metadata:
          fields: [dedication_message]
      defaults:
        logistics:
          preferred_slot: "上午"

  - slug: lantern-lighting
    label: "點燈作業"
    defaults:
      offering_type: "lamp"
      currency: "TWD"
    form_fields:
      basics:
        fields:
          - title
          - period
          - price_cents
          - currency
      schedule:
        fields:
          - available_slots
          - starts_on
          - ends_on
          - active
      description: true
    registration_form:
      sections:
        order:
          fields: [quantity, unit_price_cents, currency]
        contact:
          fields: [primary_contact, phone, email]
        logistics:
          fields: [preferred_date, preferred_slot]
        ritual_metadata:
          fields: [ancestor_placard_name, dedication_message, certificate_notes]

  - slug: ancestor-ritual
    label: "祖先拔薦"
    defaults:
      offering_type: "ritual"
      currency: "TWD"
    form_fields:
      basics:
        fields:
          - title
          - period
          - price_cents
          - currency
      ritual:
        fields:
          - description
      logistics:
        fields:
          - logistics_notes
    registration_form:
      sections:
        order:
          fields: [quantity, unit_price_cents, currency, certificate_number]
        contact:
          fields: [primary_contact, phone, email, dependents_notes, notes]
        logistics:
          fields: [preferred_date, preferred_slot, arrival_window, ceremony_location]
        ritual_metadata:
          fields: [ancestor_placard_name, dedication_message, incense_option, certificate_notes]

  - slug: pudu-table
    label: "普渡供桌"
    defaults:
      offering_type: "table"
      currency: "TWD"
    options:
      period:
        - "中元普渡"
        - "春祭普渡"
    form_fields:
      basics:
        fields:
          - title
          - period
          - price_cents
          - currency
      schedule:
        fields:
          - starts_on
          - ends_on
          - available_slots
          - active
      certificate:
        fields:
          - certificate_prefix
          - certificate_hint
      logistics:
        fields:
          - ancestor_placard_hint
          - logistics_notes
      description: true
    registration_form:
      sections:
        order:
          fields: [quantity, unit_price_cents, currency]
        contact:
          fields: [primary_contact, phone, email]
        logistics:
          fields: [preferred_date, ceremony_location]
        ritual_metadata:
          fields: [ancestor_placard_name, dedication_message]
      defaults:
        logistics:
          ceremony_location: "戶外祭壇"
