offerings:
  - slug: incense-donation
    kind: service
    label: "香油捐獻"
    defaults:
      offering_type: "donation"
      currency: "TWD"
    form_fields:
      basics:
        fields:
          - title
          - price_cents
          - currency
      donation:
        fields:
          - description
    registration_form:
      sections:
        order:
          fields: [quantity, unit_price_cents, currency]
        contact:
          fields: [primary_contact, phone, email, notes]
        logistics:
          fields: []
        ritual_metadata:
          fields: [dedication_message]
      defaults:
        order:
          quantity: 1
      field_settings:
        dedication_message:
          allow_multiple: false

  - slug: family-peace
    kind: event
    label: "平安戲丁口捐"
    defaults:
      offering_type: "ritual"
      currency: "TWD"
    form_fields:
      basics:
        fields:
          - title
          - period
          - price_cents
          - currency
      ritual:
        fields:
          - description
    registration_form:
      sections:
        order:
          fields: [quantity, unit_price_cents, currency, certificate_number]
        contact:
          fields: [primary_contact, phone, email, dependents_notes, notes]
        logistics:
          fields: [preferred_date, preferred_slot, arrival_window]
        ritual_metadata:
          fields: [dedication_message]
      defaults:
        logistics:
          preferred_slot: "上午"
      field_settings:
        preferred_slot:
          options: ["上午", "下午", "晚上"]
        arrival_window:
          options: ["08:00-09:00", "09:00-10:00", "10:00-11:00"]

  - slug: lantern-lighting
    kind: event
    label: "點燈作業"
    defaults:
      offering_type: "lamp"
      currency: "TWD"
    form_fields:
      basics:
        fields:
          - title
          - period
          - price_cents
          - currency
      schedule:
        fields:
          - available_slots
          - starts_on
          - ends_on
      description: true
    registration_form:
      sections:
        order:
          fields: [quantity, unit_price_cents, currency]
        contact:
          fields: [primary_contact, phone, email]
        logistics:
          fields: [preferred_date, preferred_slot]
        ritual_metadata:
          fields: [ancestor_placard_name, dedication_message, certificate_notes]
      field_settings:
        preferred_slot:
          options: ["Morning", "Afternoon", "Evening"]
        dedication_message:
          allow_multiple: true

  - slug: ancestor-ritual
    kind: event
    label: "祖先拔薦"
    defaults:
      offering_type: "ritual"
      currency: "TWD"
    form_fields:
      basics:
        fields:
          - title
          - period
          - price_cents
          - currency
      ritual:
        fields:
          - description
      logistics:
        fields:
          - logistics_notes
    registration_form:
      sections:
        order:
          fields: [quantity, unit_price_cents, currency, certificate_number]
        contact:
          fields: [primary_contact, phone, email, dependents_notes, notes]
        logistics:
          fields: [preferred_date, preferred_slot, arrival_window, ceremony_location]
        ritual_metadata:
          fields: [ancestor_placard_name, dedication_message, incense_option, certificate_notes]
      field_settings:
        preferred_slot:
          options: ["上午", "下午"]
        ceremony_location:
          options: ["本殿", "天官殿", "戶外祭壇"]
        incense_option:
          options: ["Three-stick set", "Five-stick set", "Ten-stick set"]

  - slug: pudu-table
    kind: service
    label: "普渡供桌"
    defaults:
      offering_type: "table"
      currency: "TWD"
    options:
      period:
        - "中元普渡"
        - "春祭普渡"
    form_fields:
      basics:
        fields:
          - title
          - period
          - price_cents
          - currency
      schedule:
        fields:
          - starts_on
          - ends_on
          - available_slots
      certificate:
        fields:
          - certificate_prefix
          - certificate_hint
      logistics:
        fields:
          - ancestor_placard_hint
          - logistics_notes
      description: true
    registration_form:
      sections:
        order:
          fields: [quantity, unit_price_cents, currency]
        contact:
          fields: [primary_contact, phone, email]
        logistics:
          fields: [preferred_date, ceremony_location]
        ritual_metadata:
          fields: [ancestor_placard_name, dedication_message]
      defaults:
        logistics:
          ceremony_location: "戶外祭壇"
      field_settings:
        ceremony_location:
          options: ["戶外祭壇", "本殿入口", "後殿"]
        dedication_message:
          allow_multiple: false
