offerings:
- slug: incense-donation
  label: 香油捐獻
  type: donation
  registration_period: perennial
  fields:
    amount:
      type: currency
      required: true
    notes:
      type: preset_select_or_text
      presets:
      - 福宴
      - 祝壽
      - 壽塔
      - 頂燈
      - 金牌壹面1份
      - 金牌壹面3分
      - 金牌壹面5分
      - 金牌壹面1錢
      - 金身：濟公禪師
      - 進香贊助
      - 環保金爐
      - 白米10斤
      - 貨車油資
      - 平安座週年慶
- slug: lamp-service
  label: 點燈作業
  type: ritual_service
  registration_period: yearly
  structure:
    registration:
    - persons:
        fields:
        - name
        - birthdate
        - gender
        - phone
        - mobile_phone
        - address
        - lunar_calendar:
            type: boolean
            default: true
        - leap_month:
            type: boolean
            default: false
        - mail_certificate:
            type: boolean
            default: false
        lamps:
          type: catalog_boolean
          catalog: lamp_types
  derived:
  - age
  - zodiac
  - heavenly_stem_earthly_branch
- slug: peace-opera-household
  label: 平安戲丁口捐
  type: ritual_service
  registration_period: perennial
  structure:
    household_fields:
    - household_representative_name
    - phone
    - mobile_phone
    - address
    household_members:
      type: repeatable_person_list
      fields:
      - name
      # TODO: confirm whether birthdate is required here or only on 禮斗法會.
      - birthdate:
          optional: true
      # TODO: confirm whether member-level address ever differs from household address.
      - notes:
          optional: true
    summary_fields:
    - people_count:
        type: integer
        optional: true
    - amount:
        type: currency
        default: 1500
- slug: ritual-bucket-ceremony
  label: 禮斗法會
  type: ritual_service
  registration_period: event_specific
  # TODO: confirm exact seasonal/period key naming once temple finalizes this year's ceremony window.
  structure:
    sponsor_fields:
    - sponsor_name
    - phone
    - mobile_phone
    - address
    ritual_fields:
    - ritual_bucket_position:
        type: select
        catalog: ritual_bucket_positions
    - amount:
        type: currency
        default: 1500
    registrants:
      type: repeatable_person_list
      fields:
      - name
      - birthdate
      - gender
      - calendar_type:
          type: select
          options:
          - lunar
          - solar
          default: lunar
      - leap_month:
          type: boolean
          default: false
    notes:
      type: text
      optional: true
  derived:
  - zodiac
  - heavenly_stem_earthly_branch
- slug: ghost-festival-table
  label: 普渡供桌
  type: ritual_service
  registration_period: festival_specific
  festival: 中元普渡
  structure:
    sponsor:
    - sponsor_name
    - organization_name:
        optional: true
    - representative_name:
        optional: true
    - phone
    - mobile_phone
    - address
    table:
    - table_number
    - table_position
    - amount:
        type: currency
        default: 1500
    - notes:
        optional: true
  public_report_fields:
  - table_number
  - display_name
- slug: liberation-ritual
  label: 拔薦
  type: ritual_service
  registration_period: event_specific
  base_fields:
  - year
  - donation_date
  - donation_amount
  - donor_name
  - donor_phone
  - secondary_contact_name
  - secondary_contact_phone
  - contact_address
  - postal_code
  - certificate_number
  - invalid_record:
      type: boolean
      default: false
  ritual_type:
    type: select
    catalog: liberation_types
  variants:
    拔薦歷代祖先:
      display_text: 家歷代祖先
    拔薦親友亡魂:
      fields:
      - deceased_name
      - birth_year
      - birth_month
      - birth_day
      - death_year
      - death_month
      - death_day
      - age_at_death
    拔薦冤親債主:
      display_text: 冤親債主
    拔薦嬰靈:
      display_text: 嬰靈
