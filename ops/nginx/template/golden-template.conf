# ops/nginx/golden-template.conf
#
# Nginx vhost template for the Golden Template stack.
# Align every placeholder with `AppConstants::Project` values before deploying.
#
# Pattern:
# - Vue build serves the public site (`/`) plus `/marketing` showcase from `/var/www/{{project_slug}}`.
# - Rails (Puma) powers `/marketing/admin`, `/admin`, `/api`, and Rails assets via `/backend/assets` (with optional `/assets` compatibility).
# - Copy this file per client and swap `{{project_slug}}`, domain placeholders, and socket names.

