


upstream rails_puma {
  server 127.0.0.1:3000 fail_timeout=0;
}

server {
  listen 80;
  server_name web.example.com;
  root /home/deploy/shenfukung-wenfu/rails/public;

  # Static asset cache headers
  location ~ ^/(assets|packs|packs-test|uploads)/ {
    expires max;
    add_header Cache-Control "public";
    try_files $uri =404;
  }

  # Rails/Turbo entry point
  location / {
    proxy_pass http://rails_puma;
    proxy_set_header Host $host;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
  }
}

server {
  listen 80;
  server_name api.example.com;
  location / {
    proxy_pass http://rails_puma;
  }
}

server {
  listen 80;
  server_name project.com;
  root /var/www/shenfukung-wenfu;

  # ACME + static asset passthrough
  location /.well-known/ {
    try_files $uri $uri/ =404;
  }

  # Marketing build outputs (Vue) live under /marketing-assets
  location ^~ /marketing-assets/ {
    try_files $uri $uri/ =404;
  }

  # Proxy powered sections back to Rails (demo admin + real admin/API)
  location ^~ /marketing/admin {
    proxy_pass http://rails_puma;
    proxy_set_header Host $host;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
  }

  location ^~ /admin {
    proxy_pass http://rails_puma;
    proxy_set_header Host $host;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
  }

  location ^~ /api {
    proxy_pass http://rails_puma;
    proxy_set_header Host $host;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
  }

  # Vue handles the main site plus the hidden /marketing showcase
  location / {
    try_files $uri $uri/ /index.html;
  }
}

server {
  listen 80;
  server_name app.example.com;
  location / {
    proxy_pass http://rails_puma;
  }
}

server {
  listen 80;
  server_name dev.example.com;
  location / {
    proxy_pass http://rails_puma;
  }
}
