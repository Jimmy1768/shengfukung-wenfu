<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>SourceGrid Pricing Guide</title>
    <style>
      body {
        margin: 0;
        font-family: Inter, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
        background: #0f172a;
        color: #e5e7eb;
        display: grid;
        min-height: 100vh;
        place-items: center;
      }

      main {
        max-width: 760px;
        padding: 48px 24px;
      }

      h1 {
        margin: 0 0 16px;
        font-size: clamp(32px, 6vw, 56px);
      }

      p {
        color: #cbd5e1;
        font-size: 18px;
        line-height: 1.7;
      }

      code {
        color: #fbbf24;
      }
    </style>
  </head>
  <body>
    <main>
      <h1>SourceGrid Pricing Guide</h1>
      <p>
        This standalone guide is intentionally kept free of hardcoded prices.
        The canonical price list lives in <code>vue/src/sourcegrid/pricing/priceList.js</code>.
      </p>
      <p>
        Use the live demo pricing page or import the canonical price list when building a
        rendered pricing guide.
      </p>
    </main>
  </body>
</html>
