<!doctype html>
<html lang="zh-Hant">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>SourceGrid 價格方案說明</title>
    <style>
      body {
        margin: 0;
        font-family: Inter, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
        background: #0f172a;
        color: #e5e7eb;
        display: grid;
        min-height: 100vh;
        place-items: center;
      }

      main {
        max-width: 760px;
        padding: 48px 24px;
      }

      h1 {
        margin: 0 0 16px;
        font-size: clamp(32px, 6vw, 56px);
      }

      p {
        color: #cbd5e1;
        font-size: 18px;
        line-height: 1.7;
      }

      code {
        color: #fbbf24;
      }
    </style>
  </head>
  <body>
    <main>
      <h1>SourceGrid 價格方案說明</h1>
      <p>
        此獨立頁面刻意不保存價格數字。正式價格來源是
        <code>vue/src/sourcegrid/pricing/priceList.js</code>。
      </p>
      <p>
        建立正式價格頁或報價文件時，請使用即時展示頁或匯入同一份價格清單。
      </p>
    </main>
  </body>
</html>
